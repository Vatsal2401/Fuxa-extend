        (function() {
            // Use actual screen dimensions
            var screenWidth = window.screen.width * (window.devicePixelRatio || 1);
            var targetWidth = 768; // Target width for mobile devices (lower = bigger content)

            if (window.screen.width < 768) {
                var scale = window.screen.width / targetWidth;
                document.write('<meta name="viewport" content="width=' + targetWidth + ', initial-scale=' + scale + ', minimum-scale=' + scale + ', maximum-scale=' + scale + ', user-scalable=no, viewport-fit=cover">');
            } else {
                document.write('<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">');
            }

    <script>
        /* Pre-boot theme: applies the dark-theme class before Angular mounts
           so there is no flash of the wrong theme. Precedence:
             1. user pref in localStorage    (set by the in-app toggle)
             2. OS prefers-color-scheme
             3. default → dark (FUXA aesthetic) */
        (function() {
            try {
                var saved = localStorage.getItem('fuxa.theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var dark = (saved === 'dark') || (!saved && (prefersDark || prefersDark === undefined));
                if (dark) { document.documentElement.classList.add('dark-theme'); }
            } catch (e) { document.documentElement.classList.add('dark-theme'); }
        })();
    </script>
